version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healthband
    ports:
      - '5432:5432'
    volumes:
      - healthband_pgdata:/var/lib/postgresql/data

volumes:
  healthband_pgdata:
